# ─────────────────────────────────────────────
#  Support Tawk — Yapılandırma Dosyası
#  Kurulumdan önce bu dosyayı doldurun.
# ─────────────────────────────────────────────

site:
  name: "Şirketim"                  # Admin panelinde ve widget başlığında görünür
  domain: "https://siteniz.com"     # Widgetin gömüleceği sitenin adresi
  logo_url: ""                      # İsteğe bağlı logo URL'si

server:
  host: "0.0.0.0"
  port: 8000
  secret_key: "BURAYA_GUCLU_BIR_ANAHTAR_YAZIN"   # JWT imzalama anahtarı, değiştirin
  cors_origins:                     # Widgete izin verilen origin'ler (* = hepsi)
    - "*"

admin:
  default_username: "admin"
  default_password: "admin123"      # İlk girişten sonra değiştirin!
  session_hours: 24

database:
  type: "sqlite"                    # sqlite | postgres | mysql
  path: "./data/support.db"        # Sadece SQLite için
  # Postgres/MySQL için aşağıdakileri doldurun:
  # host: "localhost"
  # port: 5432
  # name: "support_tawk"
  # username: "dbuser"
  # password: "dbpassword"

chat:
  widget_color: "#2563eb"           # Sohbet butonu rengi (hex)
  welcome_message: "Merhaba! Size nasıl yardımcı olabilirim?"
  offline_message: "Şu an çevrimdışıyız, mesajınızı bırakın."
  response_time_text: "Genellikle birkaç dakika içinde yanıtlarız"
  notification_sound: true

limits:
  max_file_size_mb: 10             # Dosya yükleme limiti
  max_image_size_mb: 5             # Resim yükleme limiti
  allowed_file_types:
    - "jpg"
    - "jpeg"
    - "png"
    - "gif"
    - "pdf"
    - "doc"
    - "docx"
    - "txt"
    - "zip"
  max_message_length: 4000
  conversations_per_page: 20

ai:
  enabled: false
  provider: "openai"               # openai | anthropic | none
  api_key: ""
  model: "gpt-3.5-turbo"          # OpenAI: gpt-3.5-turbo, gpt-4 | Anthropic: claude-haiku-4-5-20251001
  system_prompt: |
    Sen bir müşteri destek asistanısın. Kibarca ve yardımcı ol.
    Soruyu cevaplamak için yeterli bilgin yoksa kullanıcıyı bir insana yönlendir.
  auto_reply: true                 # Destek temsilcisi yokken otomatik cevap ver
  handoff_message: "Sizi bir destek temsilcisine bağlıyorum, lütfen bekleyin."
  confidence_threshold: 0.7        # Bu değerin altında AI cevap vermez, insan devreye girer
