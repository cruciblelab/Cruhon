<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — Support Tawk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);width:100%;max-width:360px}
.logo{text-align:center;font-size:28px;margin-bottom:8px}
h1{text-align:center;font-size:20px;color:#1e293b;margin-bottom:4px}
.sub{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:28px}
label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:16px}
input:focus{border-color:#2563eb}
button{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
button:hover{background:#1d4ed8}
button:disabled{opacity:.5;cursor:default}
.error{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">💬</div>
  <h1>Support Tawk</h1>
  <p class="sub">Yönetici Paneli</p>
  <div class="error" id="err"></div>
  <form id="form">
    <label for="u">Kullanıcı Adı</label>
    <input id="u" type="text" autocomplete="username" required>
    <label for="p">Şifre</label>
    <input id="p" type="password" autocomplete="current-password" required>
    <button type="submit" id="btn">Giriş Yap</button>
  </form>
</div>
<script>
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();
  var btn = document.getElementById("btn");
  var err = document.getElementById("err");
  btn.disabled = true;
  err.style.display = "none";
  try {
    var r = await fetch("/api/admin/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({username: document.getElementById("u").value, password: document.getElementById("p").value})
    });
    var data = await r.json();
    if (!r.ok) throw new Error(data.detail || "Giriş başarısız");
    localStorage.setItem("st_token", data.token);
    localStorage.setItem("st_agent", JSON.stringify(data.agent));
    window.location.href = "/admin";
  } catch(ex){
    err.textContent = ex.message;
    err.style.display = "block";
    btn.disabled = false;
  }
});
</script>
</body>
</html>
